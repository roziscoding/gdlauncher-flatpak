name: Build & Release

on:
  # called by check-update.yml once a new GDLauncher version has been tagged
  workflow_call:
    inputs:
      tag:
        description: Tag to build and publish a release for
        required: true
        type: string
  # a version tag pushed directly (e.g. locally via `mise run update`)
  push:
    tags: ['*.*.*']
  # build-only validation on PRs (no release)
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GDLauncher.flatpak
          manifest-path: gg.gdl.GDLauncher.yml

      - uses: actions/upload-artifact@v4
        with:
          name: GDLauncher-flatpak
          path: GDLauncher.flatpak

  release:
    needs: build
    # on a tag push, or when called with a tag input; skipped on pull_request
    if: github.event_name == 'push' || inputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: GDLauncher-flatpak

      - uses: softprops/action-gh-release@v2
        with:
          name: GDLauncher ${{ inputs.tag || github.ref_name }}
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: GDLauncher.flatpak
          fail_on_unmatched_files: true

  # refresh the OSTree repo served via GitHub Pages (skipped on pull_request)
  pages:
    if: github.event_name == 'push' || inputs.tag != ''
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
    with:
      ref: ${{ inputs.tag || github.ref_name }}
