name: Build & Release

on:
  # called by check-update.yml once a new GDLauncher version has been tagged
  workflow_call:
    inputs:
      tag:
        description: Tag to build and publish a release for
        required: true
        type: string
  # build-only validation on PRs (no release)
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: GDLauncher.flatpak
          manifest-path: gg.gdl.GDLauncher.yml

      - uses: actions/upload-artifact@v4
        with:
          name: GDLauncher-flatpak
          path: GDLauncher.flatpak

  release:
    needs: build
    # only when called with a tag (workflow_call); skipped on pull_request
    if: inputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: GDLauncher-flatpak

      - uses: softprops/action-gh-release@v2
        with:
          name: GDLauncher ${{ inputs.tag }}
          tag_name: ${{ inputs.tag }}
          files: GDLauncher.flatpak
          fail_on_unmatched_files: true
