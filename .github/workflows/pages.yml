name: Publish Flatpak repo to Pages

on:
  # manual seed / re-publish (use this for the first run)
  workflow_dispatch: {}
  # called by release.yml so every release refreshes the OSTree repo
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag) to build the repo from
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

# never run two deploys at once; let an in-flight one finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-repo:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Build into an OSTree repo
        run: |
          flatpak-builder --repo=repo --force-clean --disable-rofiles-fuse \
            build-dir gg.gdl.GDLauncher.yml
          flatpak build-update-repo --prune repo

      - name: Add .flatpakrepo + landing page
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # use the real Pages URL (handles custom domains); fall back to github.io
          base="$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages" \
            | grep -o '"html_url"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 \
            | sed -E 's/.*"([^"]*)"$/\1/' || true)"
          [ -n "$base" ] || base="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}"
          base="${base/#http:/https:}"            # force https
          case "$base" in */) ;; *) base="$base/";; esac   # ensure trailing slash
          echo "Repo URL: $base"
          cat > repo/gdlauncher.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=GDLauncher (unofficial)
          Url=${base}
          Homepage=https://gdlauncher.com
          Comment=Unofficial Flatpak packaging of GDLauncher
          Description=Unofficial Flatpak repository that repackages the upstream GDLauncher AppImage.
          EOF
          cat > repo/index.html <<EOF
          <!doctype html><meta charset="utf-8">
          <title>GDLauncher (unofficial) Flatpak repo</title>
          <h1>GDLauncher — unofficial Flatpak repo</h1>
          <p>Add the remote and install:</p>
          <pre>flatpak remote-add --if-not-exists gdlauncher ${base}gdlauncher.flatpakrepo
          flatpak install gdlauncher gg.gdl.GDLauncher</pre>
          <p>It then updates via <code>flatpak update</code> or your software center.</p>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: build-repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
